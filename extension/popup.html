<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Papr</title>
    <style>
      :root {
        --paper: #f6f3ec;
        --ink: #2b2722;
        --muted: #8a8275;
        --accent: #b5651d;
        --hair: #e3ddd0;
      }
      * { box-sizing: border-box; }
      body {
        width: 320px;
        margin: 0;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--paper);
        color: var(--ink);
      }
      header {
        padding: 12px 14px 8px;
        border-bottom: 1px solid var(--hair);
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 650;
        letter-spacing: -0.01em;
      }
      header p {
        margin: 2px 0 0;
        font-size: 11.5px;
        color: var(--muted);
      }
      ul { list-style: none; margin: 0; padding: 6px; }
      li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-radius: 8px;
      }
      li:hover { background: rgba(0, 0, 0, 0.04); }
      .meta { flex: 1; min-width: 0; }
      .title {
        font-size: 12.5px;
        font-weight: 550;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .url {
        font-size: 10.5px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .kind {
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--accent);
      }
      button.sub {
        font-family: inherit;
        font-size: 11.5px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: 0;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }
      button.sub:hover { filter: brightness(0.94); }
      .empty {
        padding: 22px 16px;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Papr</h1>
      <p id="subtitle">Looking for feeds…</p>
    </header>
    <ul id="feeds"></ul>
    <div class="empty" id="empty" hidden>
      No feeds on this page. Try a blog, a YouTube channel, or a subreddit.
    </div>
    <!-- detect.js exposes globalThis.PaprDetect for buildSubscribeLink. -->
    <script src="src/detect.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
